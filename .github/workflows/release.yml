name: Release
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write
  issues: write
  packages: write
  statuses: write

jobs:
  release:
    name: Release
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prepare repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com/
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install release tools
        run: |
          npm i auto @auto-it/conventional-commits semver --no-save
          git restore package-lock.json

      # ============================================================
      # TAG-BASED RELEASE FLOW (no commits to main)
      #
      # The version source of truth is the git tag, not package.json.
      # We bump versions locally in the runner, publish, create tags,
      # and push only tags (not blocked by branch rulesets).
      # package.json on main stays frozen.
      # ============================================================

      - name: Calculate version bump
        id: version
        run: |
          BUMP=$(npx auto version 2>/dev/null | grep -oE '^(major|minor|patch)$' | tail -1)
          if [ -z "$BUMP" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump needed"
          else
            echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version bump: $BUMP"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        if: steps.version.outputs.skip == 'false'
        run: npx auto changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version packages from tags (local only, no commit)
        if: steps.version.outputs.skip == 'false'
        run: |
          BUMP=${{ steps.version.outputs.bump }}
          for pkg_dir in packages/*/; do
            name=$(node -p "require('./${pkg_dir}package.json').name")
            latest_tag=$(git tag -l "${name}@*" --sort=-v:refname | head -1)
            if [ -z "$latest_tag" ]; then
              current="0.0.0"
            else
              current="${latest_tag##*@}"
            fi
            new_version=$(npx semver "$current" -i "$BUMP")
            echo "${name}: ${current} -> ${new_version}"
            (cd "$pkg_dir" && npm version "$new_version" --no-git-tag-version)
          done

      - name: Publish packages
        if: steps.version.outputs.skip == 'false'
        run: |
          for pkg_dir in packages/*/; do
            echo "Publishing ${pkg_dir}..."
            (cd "$pkg_dir" && npm publish)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tags
        if: steps.version.outputs.skip == 'false'
        run: |
          for pkg_dir in packages/*/; do
            name=$(node -p "require('./${pkg_dir}package.json').name")
            version=$(node -p "require('./${pkg_dir}package.json').version")
            tag="${name}@${version}"
            echo "Creating tag: $tag"
            git tag "$tag"
          done
          git push origin --tags

      - name: Create GitHub Release
        if: steps.version.outputs.skip == 'false'
        run: npx auto release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

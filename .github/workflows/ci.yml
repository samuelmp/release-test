name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate packages
        run: |
          echo "Validating pkg-a..."
          node packages/pkg-a/index.js
          echo "Validating pkg-b..."
          node packages/pkg-b/index.js
          echo "All packages valid"
